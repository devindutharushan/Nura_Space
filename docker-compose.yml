services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      JWT_SECRET: ${JWT_SECRET:-nura-dev-secret-change-in-production}
      OWM_API_KEY: ${OWM_API_KEY}
      CLIENT_ORIGIN: "http://localhost:5173"
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('http').get('http://localhost:3001/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - "5173:80"
    environment:
      SERVER_HOST: "server:3001"
    depends_on:
      server:
        condition: service_healthy
