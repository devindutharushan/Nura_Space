name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server — lint, type-check, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace=nura-space-server

      - name: Lint
        working-directory: server
        run: npm run lint

      - name: Type check
        working-directory: server
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: server
        run: npm test

  client:
    name: Client — lint, type-check, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --workspace=nura-space-client

      - name: Lint
        working-directory: client
        run: npm run lint

      - name: Type check
        working-directory: client
        run: npx tsc --noEmit

      - name: Build
        working-directory: client
        run: npm run build
